<!DOCTYPE html>
<html lang="en" data-theme="neo">
<head>
<meta charset="UTF-8">
<title>CYBERWATCH — Global Threat Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ── THEME TOKENS ── */
[data-theme="neo"]{
  --bg:#02040a;--cyan:#29e0ff;--violet:#9b6dff;--ok:#00ffa3;--warn:#ffb020;--crit:#ff3b6b;
  --glass:rgba(10,16,32,.6);--glass2:rgba(7,11,22,.8);--edge:rgba(120,200,255,.18);
  --txt:#cfe9ff;--dim:#4a6880;--panel-w:300px;--term-h:230px;
}
[data-theme="classic"]{
  --bg:#020804;--cyan:#00ff88;--violet:#00cc55;--ok:#00ff88;--warn:#ffaa00;--crit:#ff3333;
  --glass:rgba(0,10,4,.7);--glass2:rgba(0,8,3,.9);--edge:rgba(0,80,40,.5);
  --txt:#99ffcc;--dim:#004422;--panel-w:300px;--term-h:230px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;overflow:hidden;transition:background .4s}

/* ── LAYOUT GRID ── */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:20;
  background:var(--glass2);backdrop-filter:blur(20px);border-bottom:1px solid var(--edge);
  display:flex;align-items:center;gap:10px;padding:0 14px}
#layout{position:fixed;top:52px;left:0;right:0;bottom:0;display:grid;
  grid-template-columns:var(--panel-w) 1fr;grid-template-rows:1fr var(--term-h)}
#globe-area{grid-column:2;grid-row:1;position:relative;overflow:hidden}
#left-pane{grid-column:1;grid-row:1/3;border-right:1px solid var(--edge);overflow:hidden;display:flex;flex-direction:column;background:var(--glass2)}
#term-pane{grid-column:2;grid-row:2;border-top:1px solid var(--edge);display:flex;flex-direction:column;background:var(--glass2)}

/* ── TOP BAR ── */
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;letter-spacing:3px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 8px rgba(41,224,255,.3));flex-shrink:0;line-height:1}
.logo small{display:block;font-family:'Rajdhani';font-size:8px;letter-spacing:3px;-webkit-text-fill-color:var(--dim);color:var(--dim)}
.divr{width:1px;height:30px;background:var(--edge);flex-shrink:0}
.hb{flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:0}
.hbl{font-size:8px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;font-weight:600}
.hbv{font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;color:#fff;line-height:1.1}
#defcon-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
#defcon-ring{position:relative;width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#defcon-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
#defcon-num{font-family:'Orbitron';font-weight:900;font-size:15px;color:var(--ok);text-shadow:0 0 10px currentColor}
#mission-t{font-size:19px;color:#fff;text-shadow:0 0 8px rgba(41,224,255,.4)}
#ops-t{font-size:13px;color:var(--cyan)}
#ops-d{font-size:8px;color:var(--violet);letter-spacing:1px}
#score-v{font-size:17px;color:var(--ok);text-shadow:0 0 8px rgba(0,255,163,.35)}
#tick-wrap{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent);
  mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent)}
#ticker{white-space:nowrap;font-size:10px;color:var(--dim);animation:tick 80s linear infinite;font-weight:500}
@keyframes tick{0%{transform:translateX(100vw)}100%{transform:translateX(-200%)}}
.top-btn{background:transparent;color:var(--cyan);border:1px solid var(--edge);border-radius:7px;
  font-family:'Rajdhani';font-weight:700;font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:1px;
  transition:all .2s;flex-shrink:0;white-space:nowrap}
.top-btn:hover:not(:disabled){background:rgba(41,224,255,.12);border-color:var(--cyan)}
.top-btn:disabled{opacity:.2;cursor:not-allowed}
.top-btn.red{color:var(--crit)}.top-btn.red:hover:not(:disabled){border-color:var(--crit);background:rgba(255,59,107,.1)}
.top-btn.amber{color:var(--warn)}.top-btn.amber:hover:not(:disabled){border-color:var(--warn);background:rgba(255,176,32,.1)}
input#dur{background:rgba(0,0,0,.4);color:var(--cyan);border:1px solid var(--edge);border-radius:7px;
  font-family:'Rajdhani';font-weight:700;font-size:12px;padding:4px 5px;width:42px;flex-shrink:0;text-align:center}

/* ── LEFT PANE ── */
.pane-hdr{padding:8px 13px;border-bottom:1px solid var(--edge);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;
  color:var(--cyan);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pane-hdr .ct{font-family:'Rajdhani';font-size:10px;color:var(--dim);font-weight:600}
#inc-list{overflow-y:auto;flex:1 1 0;padding:8px}
.ic{padding:9px 10px;margin-bottom:6px;border-radius:10px;cursor:pointer;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
  border-left:3px solid var(--dim);transition:all .16s;position:relative}
.ic:hover{background:rgba(41,224,255,.06);transform:translateX(2px)}
.ic.s1{border-left-color:var(--ok)}.ic.s2{border-left-color:var(--warn)}
.ic.s3{border-left-color:var(--crit);box-shadow:0 0 14px rgba(255,59,107,.15)}
.ic.res{opacity:.25;filter:grayscale(.7);pointer-events:none}
.ic-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.ic-ico{font-size:15px}.ic-nm{font-size:13px;font-weight:700;flex:1;line-height:1.2;color:#e8f5ff}
.ic-pill{font-family:'Orbitron';font-size:7px;font-weight:700;padding:2px 6px;border-radius:20px}
.p1{background:rgba(0,255,163,.1);color:var(--ok)}.p2{background:rgba(255,176,32,.12);color:var(--warn)}
.p3{background:rgba(255,59,107,.14);color:var(--crit)}.pr{background:rgba(74,104,128,.15);color:var(--dim)}
.ic-info{font-size:10px;color:var(--dim);font-weight:500;line-height:1.4}
.ic-next-chip{display:inline-flex;align-items:center;gap:5px;margin-top:5px;
  background:rgba(41,224,255,.1);border:1px solid rgba(41,224,255,.3);border-radius:20px;
  padding:3px 9px 3px 7px;font-size:11px;color:var(--cyan);font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.ic-next-chip:hover{background:rgba(41,224,255,.22);box-shadow:0 0 10px rgba(41,224,255,.3)}
.ic-esc{font-size:10px;margin-top:4px;font-weight:600}
.ic-mut{font-size:9px;color:var(--violet);margin-top:2px;font-weight:600}
.ic-bar{height:2px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden}
.ic-bar>i{display:block;height:100%;border-radius:2px;transition:width .3s}

/* ── TERMINAL ── */
.pane-hdr2{padding:7px 14px;border-bottom:1px solid var(--edge);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;
  color:var(--cyan);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#t-out{flex:1 1 0;overflow-y:auto;padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.5;min-height:0}
.ti,.ts,.te,.tw,.ty,.td,.tc,.th,.tsys,.tg{display:block}
.ti{color:#7fe9c8}.ts{color:var(--ok);font-weight:bold}.te{color:var(--crit)}.tw{color:var(--warn)}
.ty{color:var(--violet);line-height:1.7}.td{color:var(--dim)}.tc{color:#fff;margin-top:2px}
.tsys{color:var(--cyan)}.tg{color:#ff9d5c}
.th{color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;margin:4px 0 2px}
.t-exec-row{display:flex;align-items:center;gap:8px;margin-top:4px;padding-left:0}
.t-exec-btn{background:rgba(41,224,255,.1);color:var(--cyan);border:1px solid rgba(41,224,255,.35);border-radius:8px;
  font-family:'Share Tech Mono';font-size:12px;padding:5px 14px;cursor:pointer;letter-spacing:.5px;
  transition:all .15s}
.t-exec-btn:hover{background:rgba(41,224,255,.25);box-shadow:0 0 12px rgba(41,224,255,.3)}
#t-in-row{display:flex;align-items:center;padding:7px 14px;border-top:1px solid var(--edge);flex-shrink:0}
#t-prompt{color:var(--cyan);font-family:'Share Tech Mono';font-size:12px;margin-right:6px;white-space:nowrap;
  text-shadow:0 0 6px rgba(41,224,255,.4);user-select:none;transition:all .3s}
#t-in{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'Share Tech Mono',monospace;font-size:12px;caret-color:var(--cyan)}

/* ── GLOBES ── */
#globe-area canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#c2d{display:none}
#labels{position:absolute;inset:0;pointer-events:none;overflow:hidden}

/* ── NEWS FLASH ── */
#news-stack{position:fixed;top:62px;right:14px;width:310px;z-index:50;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.nf{border-radius:12px;padding:13px 14px;pointer-events:all;
  background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--edge);
  transform:translateX(340px);opacity:0;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.nf.show{transform:translateX(0);opacity:1}
.nf.out{transform:translateX(340px);opacity:0;transition:transform .3s ease-in,opacity .2s}
.nf-tag{font-family:'Orbitron';font-size:8px;letter-spacing:2px;margin-bottom:4px;font-weight:700}
.nf-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;line-height:1.2}
.nf-sub{font-size:11px;color:var(--dim);line-height:1.4;margin-bottom:8px;font-weight:500}
.nf-btn{font-family:'Rajdhani';font-weight:700;font-size:11px;letter-spacing:1px;padding:6px 14px;
  border-radius:7px;border:none;cursor:pointer;transition:all .15s}
.nf-ok{background:var(--ok);color:#02040a}
.nf-warn{background:var(--warn);color:#02040a}
.nf-crit{background:var(--crit);color:#fff}

/* ── OVERLAYS ── */
.overlay{display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(circle at 50% 40%,rgba(20,30,60,.5),rgba(0,2,8,.94))}
.overlay.show{display:flex}
.ov-card{max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:28px 32px;border-radius:18px;
  background:var(--glass2);backdrop-filter:blur(20px);border:1px solid var(--edge)}
.ov-tag{font-family:'Orbitron';font-size:8px;letter-spacing:4px;color:var(--dim);margin-bottom:5px}
.ov-title{font-family:'Orbitron';font-weight:900;font-size:28px;letter-spacing:2px;margin-bottom:5px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
.ov-sub{font-size:12px;color:var(--cyan);margin-bottom:22px;letter-spacing:1px;font-weight:600}
.ov-sh{font-family:'Orbitron';font-size:9px;letter-spacing:2px;color:var(--violet);
  border-bottom:1px solid var(--edge);padding-bottom:5px;margin:16px 0 10px}
.ov-txt{font-size:13px;color:var(--txt);line-height:1.7;font-weight:500}
.ov-cmd{display:grid;grid-template-columns:130px 1fr;gap:8px;align-items:start;margin-bottom:7px}
.ov-cmd code{font-family:'Share Tech Mono';font-size:12px;color:#fff;background:rgba(41,224,255,.1);
  padding:4px 10px;border-radius:7px;border:1px solid var(--edge)}
.ov-cmd span{font-size:12px;color:var(--dim);font-weight:500;padding-top:3px}
.ov-rules{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ov-rule{padding:9px 12px;border-left:3px solid;border-radius:0 8px 8px 0;font-size:12px;
  line-height:1.5;background:rgba(255,255,255,.02);font-weight:500}
.ov-rule.r{border-color:var(--crit)}.ov-rule.y{border-color:var(--warn)}
.ov-rule.g{border-color:var(--ok)}.ov-rule.w{border-color:var(--violet)}
.ov-q{font-size:13px;color:#fff;margin-top:14px;padding:14px;border:1px solid var(--edge);border-radius:11px;line-height:1.7;background:rgba(41,224,255,.04)}
.ov-btn{display:block;width:100%;margin-top:18px;padding:13px;font-family:'Orbitron';font-weight:700;font-size:11px;
  letter-spacing:3px;color:#02040a;background:linear-gradient(90deg,var(--cyan),var(--violet));border:none;border-radius:11px;cursor:pointer}
.ov-btn:hover{filter:brightness(1.12);box-shadow:0 0 24px rgba(41,224,255,.35)}
.grade{font-family:'Orbitron';font-weight:900;font-size:72px;text-align:center;text-shadow:0 0 40px currentColor;line-height:1;margin:8px 0}
.gtitle{font-family:'Orbitron';font-size:11px;letter-spacing:4px;text-align:center;margin-bottom:16px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}
.stat{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--edge)}
.stat .l{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.stat .v{font-family:'Orbitron';font-size:18px;margin-top:3px}
.arow{padding:5px 10px;border-left:2px solid;border-radius:0 7px 7px 0;margin-bottom:4px;background:rgba(255,255,255,.02);font-size:11px;display:flex;justify-content:space-between}

#loading{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg)}
.spinner{width:40px;height:40px;border:2px solid var(--edge);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-t{font-family:'Orbitron';font-size:12px;letter-spacing:3px;color:var(--cyan);animation:pulse2 1.4s infinite}
@keyframes pulse2{0%,100%{opacity:.3}50%{opacity:1}}
#edge-flash{position:fixed;inset:0;z-index:5;pointer-events:none}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(41,224,255,.2);border-radius:3px}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="load-t">INITIALISING THREAT GRID</div></div>
<div id="edge-flash"></div>

<div id="topbar">
  <div class="logo">CYBERWATCH<small>THREAT OPS</small></div>
  <div class="divr"></div>
  <div id="defcon-wrap">
    <div id="defcon-ring">
      <svg width="40" height="40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="2.5"/>
      <circle id="d-arc" cx="20" cy="20" r="16" fill="none" stroke="#00ffa3" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="100" stroke-dashoffset="0"/></svg>
      <div id="defcon-num">5</div>
    </div>
    <div class="hb"><div class="hbl">Defcon</div></div>
  </div>
  <div class="divr"></div>
  <div class="hb"><div class="hbl">Mission</div><div class="hbv" id="mission-t">00:00</div></div>
  <div class="divr"></div>
  <div class="hb"><div class="hbl" id="ops-d">DAY 1 · ×720</div><div class="hbv" id="ops-t" style="font-size:13px">06:00 UTC</div></div>
  <div class="divr"></div>
  <div class="hb"><div class="hbl">Score</div><div class="hbv" id="score-v">0</div></div>
  <div class="divr"></div>
  <div id="tick-wrap"><div id="ticker"></div></div>
  <div class="divr"></div>
  <div class="hbl" style="flex-shrink:0">DUR</div>
  <input type="number" id="dur" min="10" max="30" value="10">
  <button class="top-btn" id="btnStart" disabled>▶ DEPLOY</button>
  <button class="top-btn amber" id="btnReset" disabled>↺ RESET</button>
  <button class="top-btn" id="btnPause" disabled>❚❚</button>
  <button class="top-btn red" id="btnCancel" disabled>✕ ABORT</button>
  <button class="top-btn" id="btnTheme" style="font-size:9px">⬛ CLASSIC</button>
</div>

<div id="layout">
  <div id="left-pane">
    <div class="pane-hdr"><span>◆ INCIDENTS</span><span class="ct" id="inc-count">0 ACTIVE</span></div>
    <div id="inc-list"><div style="padding:18px 12px;color:var(--dim);font-size:12px;text-align:center">Standing by...</div></div>
  </div>
  <div id="globe-area">
    <canvas id="c3d"></canvas>
    <canvas id="c2d"></canvas>
    <div id="labels"></div>
    <div id="news-stack"></div>
  </div>
  <div id="term-pane">
    <div class="pane-hdr2"><span>◆ RESPONSE TERMINAL</span><span style="font-family:'Rajdhani';font-size:10px;color:var(--dim)">↑↓ history · TAB complete · click commands to execute</span></div>
    <div id="t-out"></div>
    <div id="t-in-row"><span id="t-prompt">ops@cyberwatch ▸&nbsp;</span><input id="t-in" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type here or click an incident..."></div>
  </div>
</div>

<div id="splash" class="overlay show"><div class="ov-card" id="splash-card"></div></div>
<div id="end" class="overlay"><div class="ov-card" id="ec"></div></div>
<script>
// ═══ MODULE LOADER ═══
window.CW_MODULES={};
const MODULE_SRCS=['modules/cw_phishing.js','modules/cw_ddos.js','modules/cw_ransomware.js',
  'modules/cw_sqli.js','modules/cw_brute.js','modules/cw_zeroday.js','modules/cw_social.js',
  'modules/cw_dns.js','modules/cw_trojan.js','modules/cw_mitm.js','modules/cw_credstuff.js'];
function loadModules(cb){let p=MODULE_SRCS.length;const r=[];MODULE_SRCS.forEach(src=>{
  const s=document.createElement('script');s.src=src+'?v=1';
  s.onload=()=>{r.push({ok:true});if(--p===0)cb(r);};s.onerror=()=>{r.push({ok:false});if(--p===0)cb(r);};
  document.head.appendChild(s);});}
function getScenario(inc){const m=window.CW_MODULES[inc.type];return m?(m.scenarios.find(s=>s.id===inc.scenario)||m.scenarios[0]):null;}

const FEED=['NCSC: heightened state-sponsored threat targeting UK critical national infrastructure',
  'Cl0p ransomware: new campaign active — healthcare and logistics primary targets',
  'CVE-2026-8841: zero-day in widely deployed VPN appliance — actively exploited',
  'Dark web: 14.7M credentials from financial sector breach — $12,000 BTC',
  'APT-29 infrastructure targeting EU government election systems',
  'Mirai variant: 2.3M IoT devices recruited into DDoS botnet',
  'CERT-UK: Spear-phishing campaign targeting FTSE 100 C-suite',
  'LockBit 4.0: AI-adapted payloads evading standard AV signatures',
  'Supply chain attack: popular HR software vendor confirms breach',
  'GCHQ: UK businesses face 65% rise in cyber incidents year-on-year'];

const CITY_NODES=[
  {city:"London",lat:51.507,lon:-0.128,region:"EU"},{city:"Paris",lat:48.856,lon:2.352,region:"EU"},
  {city:"Amsterdam",lat:52.367,lon:4.904,region:"EU"},{city:"Frankfurt",lat:50.110,lon:8.682,region:"EU"},
  {city:"Berlin",lat:52.520,lon:13.405,region:"EU"},{city:"Dublin",lat:53.349,lon:-6.260,region:"EU"},
  {city:"Madrid",lat:40.416,lon:-3.703,region:"EU"},{city:"Warsaw",lat:52.230,lon:21.012,region:"EU"},
  {city:"Stockholm",lat:59.334,lon:18.063,region:"EU"},{city:"Zurich",lat:47.376,lon:8.548,region:"EU"},
  {city:"New York",lat:40.713,lon:-74.006,region:"NA"},{city:"Toronto",lat:43.653,lon:-79.383,region:"NA"},
  {city:"Chicago",lat:41.878,lon:-87.630,region:"NA"},{city:"San Francisco",lat:37.774,lon:-122.419,region:"NA"},
  {city:"Mexico City",lat:19.432,lon:-99.133,region:"NA"},{city:"São Paulo",lat:-23.550,lon:-46.633,region:"LATAM"},
  {city:"Buenos Aires",lat:-34.603,lon:-58.381,region:"LATAM"},{city:"Bogotá",lat:4.711,lon:-74.072,region:"LATAM"},
  {city:"Cairo",lat:30.044,lon:31.236,region:"MEA"},{city:"Dubai",lat:25.204,lon:55.271,region:"MEA"},
  {city:"Johannesburg",lat:-26.204,lon:28.047,region:"MEA"},{city:"Lagos",lat:6.524,lon:3.379,region:"MEA"},
  {city:"Singapore",lat:1.352,lon:103.820,region:"APAC"},{city:"Tokyo",lat:35.676,lon:139.650,region:"APAC"},
  {city:"Seoul",lat:37.566,lon:126.978,region:"APAC"},{city:"Hong Kong",lat:22.319,lon:114.170,region:"APAC"},

function proj2(lat,lon){const φ=(lat)*Math.PI/180,λ=(lon+rot2)*Math.PI/180;
  const x3=Math.cos(φ)*Math.sin(λ),y3=Math.sin(φ),z3=Math.cos(φ)*Math.cos(λ);
  const cx=c2d.width/2,cy=c2d.height/2,R=Math.min(cx,cy)*0.82;
  return{x:cx+R*x3,y:cy-R*y3,z:z3,visible:z3>0};}
function h3(x,y,z){const s=Math.sin(x*127.1+y*311.7+z*74.7)*43758.5453;return s-Math.floor(s);}
function sm(t){return t*t*(3-2*t);}
function vN(x,y,z){const xi=Math.floor(x),yi=Math.floor(y),zi=Math.floor(z),u=sm(x-xi),v=sm(y-yi),w=sm(z-zi);
  const n=(_x,_y,_z)=>h3(_x,_y,_z);
  return((n(xi,yi,zi)*(1-u)+n(xi+1,yi,zi)*u)*(1-v)+(n(xi,yi+1,zi)*(1-u)+n(xi+1,yi+1,zi)*u)*v)*(1-w)+
         ((n(xi,yi,zi+1)*(1-u)+n(xi+1,yi,zi+1)*u)*(1-v)+(n(xi,yi+1,zi+1)*(1-u)+n(xi+1,yi+1,zi+1)*u)*v)*w;}
function fbm(x,y,z){let s=0,a=0.55,f=1.15;for(let i=0;i<5;i++){s+=a*vN(x*f,y*f,z*f);f*=2;a*=0.52;}return s;}

function makeMarker(inc){
  if(!is3D())return;
  const g=new THREE.Group();const pos=ll3(inc.lat,inc.lon,1.0);
  g.position.copy(pos);g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),pos.clone().normalize());
  const col=sevCol3(inc.sev);
  const core=new THREE.Mesh(new THREE.SphereGeometry(0.018,14,14),new THREE.MeshBasicMaterial({color:col}));
  g.add(core);
  const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.0025,0.004,0.14,8),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.4}));
  beam.position.y=0.07;g.add(beam);
  const rings=[];
  for(let i=0;i<inc.sev+1;i++){
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.028,0.036,38),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));
    ring.rotation.x=-Math.PI/2;ring.position.y=0.003;ring._ph=i/(inc.sev+1);g.add(ring);rings.push(ring);
  }
  globeGroup.add(g);
  inc._grp=g;inc._core=core;inc._beam=beam;inc._rings=rings;
  markerMeshes.push({mesh:core,inc});
  const lab=document.createElement("div");lab.className="alabel";labelsEl.appendChild(lab);inc._lab=lab;
  updateMCol(inc);
}
function updateMCol(inc){
  if(!inc._core)return;const col=sevCol3(inc.sev);
  inc._core.material.color.setHex(col);inc._beam.material.color.setHex(col);
  const need=inc.sev+1;
  while(inc._rings.length<need){
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.028,0.036,38),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));
    ring.rotation.x=-Math.PI/2;ring.position.y=0.003;ring._ph=Math.random();inc._grp.add(ring);inc._rings.push(ring);}
  inc._rings.forEach(r=>r.material.color.setHex(col));
}
function removeMarker(inc){
  const idx=markerMeshes.findIndex(m=>m.inc===inc);if(idx>-1)markerMeshes.splice(idx,1);
  if(inc._grp){globeGroup.remove(inc._grp);inc._grp.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});inc._grp=null;}
  if(inc._lab){inc._lab.remove();inc._lab=null;}
}
function animMarkers(dt){
  if(!is3D())return;
  const cd=camera3.position.clone().normalize();
  incidents.forEach(inc=>{
    if(!inc._grp)return;
    if(inc.resolved){if(inc._lab)inc._lab.style.opacity="0";return;}
    const t=performance.now()/1000,spd=inc.sev===3?1.7:inc.sev===2?1.1:.8,maxR=inc.sev===3?5.5:inc.sev===2?4:2.8;
    inc._rings.forEach(ring=>{const f=(t*spd+ring._ph)%1;const sc=1+f*maxR;ring.scale.set(sc,sc,sc);ring.material.opacity=.5*(1-f);});
    const cp=1+Math.sin(t*spd*2)*.18;inc._core.scale.setScalar(cp);
    const wp=new THREE.Vector3();inc._grp.getWorldPosition(wp);
    const dir=wp.clone().normalize(),facing=dir.dot(cd);
    const lab=inc._lab;
    if(facing<0.12){lab.style.opacity="0";}else{
      const p=wp.clone().project(camera3);
      const sx=(p.x*.5+.5)*c3d.clientWidth,sy=(-p.y*.5+.5)*c3d.clientHeight;
      lab.style.left=sx+"px";lab.style.top=sy+"px";lab.style.opacity=String(Math.min(1,(facing-.12)*3));
      const sc=getScenario(inc),mod=window.CW_MODULES[inc.type],hex=sevHex(inc.sev);
      lab.style.borderColor=hex;lab.style.color=hex;
      lab.innerHTML=`${mod?mod.icon:""} #${inc.id} ${sc?sc.name:inc.type}<span class="sml"> · ${inc.city}</span>`;}
  });
}
function makeArc3(s,d){
  if(!is3D())return;
  const p0=ll3(s.lat,s.lon,1.0),p2=ll3(d.lat,d.lon,1.0);
  const mid=p0.clone().add(p2).multiplyScalar(.5).normalize().multiplyScalar(1+p0.distanceTo(p2)*.45);
  const curve=new THREE.QuadraticBezierCurve3(p0,mid,p2);
  const mesh=new THREE.Mesh(new THREE.TubeGeometry(curve,44,.004,8,false),
    new THREE.MeshBasicMaterial({color:0xff3b6b,transparent:true,opacity:.85,blending:THREE.AdditiveBlending}));
  globeGroup.add(mesh);
  const part=new THREE.Mesh(new THREE.SphereGeometry(.013,10,10),new THREE.MeshBasicMaterial({color:0xffd0dd}));
  globeGroup.add(part);
  arcs3.push({mesh,part,curve,age:0,max:4.5});
}
function animArcs(dt){
  if(!is3D())return;
  arcs3.forEach(a=>{a.age+=dt;const t=Math.min(1,a.age/1.2);a.part.position.copy(a.curve.getPoint(t));a.part.visible=t<1;
    const fade=a.age>2.5?Math.max(0,1-(a.age-2.5)/2):1;a.mesh.material.opacity=.85*fade;});
  arcs3=arcs3.filter(a=>{if(a.age>=a.max){globeGroup.remove(a.mesh);globeGroup.remove(a.part);
    a.mesh.geometry.dispose();a.mesh.material.dispose();a.part.geometry.dispose();a.part.material.dispose();return false;}return true;});
}

// STRATEGIC CALCS
function getGEM(){const p=Math.min(1,simT/simDur),dF=[1.0,1.12,1.25,1.4,1.6][5-defcon],eF=(simDur-simT)<120?1.5:1.0;return(1+p*.9)*dF*eF;}
function tte(inc){if(!simRunning||inc.sev>=3)return null;return Math.max(0,(inc.escRate-inc.escAge)/(inc.escMulti*getGEM()));}
function isSpread(inc){return inc.sev>=3&&!inc.resolved&&(inc.spreadTimer||0)>10;}
function tscore(inc){if(inc.resolved)return -1;const sc=getScenario(inc);if(!sc)return 0;
  const t=tte(inc)||999,steps=sc.steps.length-inc.step;
  return((3-inc.sev)*10+(1/(t+1))*100+(isSpread(inc)?50:0)+inc.users/10000)/steps;}

function renderIncidents(){

  const disp=[...active.sort((a,b)=>b.sev-a.sev||a.escAge-b.escAge),...incidents.filter(i=>i.resolved).slice(-3)];
  list.innerHTML=disp.map(inc=>{
    const mod=window.CW_MODULES[inc.type],sc=getScenario(inc);if(!mod||!sc)return"";
    const pct=Math.min(100,(inc.escAge/inc.escRate)*100*(inc.escMulti||1));
    const bc=pct>80?"var(--crit)":pct>55?"var(--warn)":"var(--ok)";
    const bar="■".repeat(inc.step)+"□".repeat(sc.steps.length-inc.step);
    const t=tte(inc);
    const tStr=inc.resolved?"":inc.sev===3?(isSpread(inc)?`<span style="color:var(--crit)">⚡ SPREADING</span>`:`<span style="color:var(--crit)">⚠ SEV 3</span>`):(t!==null?`<span style="color:${t<15?"var(--crit)":t<30?"var(--warn)":"var(--dim)"}">⏱ ${Math.round(t)}s → Sev${inc.sev+1}</span>`:"");
    const nextCmd=!inc.resolved&&inc.step<sc.steps.length?sc.steps[inc.step]:"";

      ${!inc.resolved?`<div class="ic-bar"><i style="width:${pct}%;background:${bc}"></i></div>`:""}

const SCHED=[{a:0,i:[28,42]},{a:60,i:[18,30]},{a:150,i:[12,20]},{a:300,i:[8,15]},{a:480,i:[5,11]}];
function getSpawnIv(){const s=SCHED.filter(x=>simT>=x.a).pop()||SCHED[0];const[lo,hi]=s.i;return(lo+Math.random()*(hi-lo))*[1.6,1.3,1,.8,.65][5-defcon];}
function schedNext(first=false){nextSpawnAt=simT+(first?5+Math.random()*4:getSpawnIv());}
function minCon(){if(simT<45)return 0;if(simT<120)return 1;if(simT<240)return 2;if(simT<420)return 3;return 4;}
function sysLog(msg,cls){const w=worldClock();tPrint(`[D${w.day} ${String(w.hh).padStart(2,"0")}:${String(w.mm).padStart(2,"0")}] ${msg}`,cls||"tsys");}

function spawnIncident(fType=null,fCity=null){
  const mods=Object.keys(window.CW_MODULES);if(!mods.length)return;
  const aC=new Set(incidents.filter(i=>!i.resolved).map(i=>i.city));
  let cands=CITY_NODES.filter(c=>!aC.has(c.city));if(!cands.length)cands=CITY_NODES;
  const city=fCity||cands[Math.floor(Math.random()*cands.length)];
  const tn=fType||mods[Math.floor(Math.random()*mods.length)];
  const mod=window.CW_MODULES[tn];if(!mod)return;
  const sc=mod.scenarios[Math.floor(Math.random()*mod.scenarios.length)];
  let mut=null;if(mod.mutations&&mod.mutations.length&&Math.random()<.28)mut=mod.mutations[Math.floor(Math.random()*mod.mutations.length)];
  const em=mut?mut.escMulti:1,um=mut?mut.userMult:1;
  const ep=Math.min(.25,.05+simT/simDur*.25),rv=Math.random();
  const sev=rv<ep?2+Math.floor(Math.random()*2):1;
  const users=Math.floor((sc.uMin+Math.random()*(sc.uMax-sc.uMin))*um);
  const inc={id:nextId++,type:tn,scenario:sc.id,scenarioName:sc.name,mutation:mut?mut.name:null,
    mutationLabel:mut?mut.label:null,city:city.city,lat:city.lat,lon:city.lon,region:city.region,
    sev,users,escAge:0,escRate:sc.escR*(.7+Math.random()*.6)*em,step:0,resolved:false,escMulti:1,
    spreadTimer:0,spreadMult:mut?mut.spreadMult:1};
  incidents.push(inc);spawnedCount++;idleT=0;
  makeMarker(inc);
  sysLog(`${sev===3?"🔴":sev===2?"🟡":"⚠"} #${inc.id} ${sc.name}${mut?` [${mut.label}]`:""} · ${city.city} · Sev ${sev} · ~${users.toLocaleString()} users`,"tw");
  queueNews(inc,'spawn');
  calcDefcon();renderIncidents();if(sev===3)flashVal=1;
}
function resolveIncident(inc){
  inc.resolved=true;resolvedCount++;const pts=inc.sev===1?100:inc.sev===2?60:30;
  addScore(pts);calcDefcon();renderIncidents();
  sysLog(`✅ #${inc.id} ${inc.scenarioName} RESOLVED (+${pts} pts)`,"ts");
  setTimeout(()=>removeMarker(inc),500);
  setTimeout(()=>{
    const active=incidents.filter(i=>!i.resolved);
    if(active.length){const top=active.sort((a,b)=>tscore(b)-tscore(a))[0];const t=tte(top);
      if(isSpread(top))tPrint(`  ⚡ #${top.id} SPREADING — respond immediately: inspect ${top.id}`,"te");
      else if(t!==null&&t<20)tPrint(`  ⚠ #${top.id} escalates in ${Math.round(t)}s`,"tw");}},350);}
function doEscalation(dt){const gm=getGEM();let ch=false;
  incidents.forEach(inc=>{if(inc.resolved)return;inc.escAge+=dt*inc.escMulti*gm;const sc=getScenario(inc);if(!sc)return;
    if(inc.escAge>=inc.escRate&&inc.sev<3){inc.sev++;inc.escAge=0;ch=true;updateMCol(inc);
      sysLog(`${inc.sev===3?"🔴":"🟡"} #${inc.id} → SEV ${inc.sev}: ${sc.escs[inc.sev-1]}`,"tw");
      queueNews(inc,'escalate');if(inc.sev===3)flashVal=1;}});
  if(ch){calcDefcon();renderIncidents();}}
function doSpread(dt){incidents.forEach(inc=>{if(inc.resolved||inc.sev<3)return;
  inc.spreadTimer=(inc.spreadTimer||0)+dt;const iv=Math.max(8,15-(simT/simDur)*8);
  if(inc.spreadTimer>=iv){inc.spreadTimer=0;const sc=getScenario(inc);
    const chance=.28*(inc.spreadMult||1)*(1+simT/simDur*.5);
    if(Math.random()<chance){const ac=new Set(incidents.filter(i=>!i.resolved).map(i=>i.city));
      const cands=CITY_NODES.filter(c=>!ac.has(c.city));if(!cands.length)return;
      const dst=cands[Math.floor(Math.random()*cands.length)];
      makeArc3({lat:inc.lat,lon:inc.lon},dst);spreadEvts++;addScore(-50);flashVal=1;
      sysLog(`⚡ SPREAD: ${inc.scenarioName} → ${dst.city} [-50 pts]`,"te");
      const fc=document.getElementById("edge-flash");fc.style.boxShadow="inset 0 0 200px rgba(255,59,107,.6)";
      setTimeout(()=>fc.style.boxShadow="",800);
      queueNews(inc,'spread');
      const st=(sc&&sc.spread&&window.CW_MODULES[sc.spread])?sc.spread:inc.type;spawnIncident(st,dst);}}});}
function checkMin(){if(!simRunning||simPaused)return;const a=incidents.filter(i=>!i.resolved).length,n=minCon();
  if(a<n){spawnIncident();if(n-a>1)setTimeout(()=>spawnIncident(),2500);}}

const ALL_CMDS=["help","scan","triage","status","inspect","explain","hint","history","clear",
  "trace","isolate","block","notify-users","null-route","rate-limit","patch","revoke-access",
  "backup-restore","kill-process","lockout","dns-flush","wipe-clean","educate","scan-net"];

function runCommand(raw){
  if(typingActive){tPrint("Terminal busy.","td");return;}
  raw=raw.trim();if(!raw)return;
  const sp=raw.indexOf(" ");const cmd=sp===-1?raw.toLowerCase():raw.slice(0,sp).toLowerCase();
  const arg=sp===-1?"":raw.slice(sp+1).trim();const idN=parseInt(arg);
  tPrint("▸ "+raw,"tc");cmdHistory.unshift(raw);if(cmdHistory.length>50)cmdHistory.pop();histIdx=-1;
  tIn.value="";
  if(cmd==="clear"){tClear();return;}
  if(cmd==="help"){
    tPrint("─── QUICK REFERENCE ───","th");
    tPrint("  scan          See all threats + escalation timers","ti");
    tPrint("  triage        Priority advice — what to fix first","ti");
    tPrint("  inspect <id>  Response steps for an incident","ti");
    tPrint("  explain <id>  OCR spec theory (typewriter)","ti");
    tPrint("  hint <id>     Guided hint [-20 pts]","tw");
    tPrint("  status        Current scores + time","ti");
    tPrint("─── Pro Tips ───","th");
    tPrint("  Click incident cards or notification buttons to inspect","td");
    tPrint("  Click globe markers to inspect (3D mode)","td");
    tPrint("  Click chip buttons in cards to execute next command","td");
    tPrint("  Step progress SAVES — juggle 3+ incidents in parallel","td");
    tPrint("  Drag globe to rotate · scroll to zoom (3D mode)","td");
    return;}
  if(cmd==="scan"){
    const active=incidents.filter(i=>!i.resolved);
    if(!active.length){tPrint("No active incidents.","ti");return;}
    tPrint(`─── ${active.length} Active · DEFCON ${defcon} ───`,"th");
    active.sort((a,b)=>tscore(b)-tscore(a)).forEach(inc=>{
      const mod=window.CW_MODULES[inc.type],sc=getScenario(inc);if(!mod||!sc)return;
      const bar="■".repeat(inc.step)+"□".repeat(sc.steps.length-inc.step),t=tte(inc);
      const ts=inc.sev===3?(isSpread(inc)?"⚡SPREAD":"🔴SEV3"):t!==null?`⏱${Math.round(t)}s`:"";
      const cls=inc.sev===3||t<15?"te":t<30?"tw":"ti";
      tPrint(`  #${String(inc.id).padEnd(3)}${mod.icon} ${sc.name.padEnd(28)}[${bar}] ${inc.city.padEnd(14)}${ts}`,cls);});
    const top=active.sort((a,b)=>tscore(b)-tscore(a))[0];if(top){const sc=getScenario(top),t=tte(top);
      if(isSpread(top))tPrint(`  → CRITICAL: #${top.id} spreading. Act now.`,"te");
      else if(t<20&&sc)tPrint(`  → URGENT: #${top.id} escalates in ${Math.round(t)}s — ${sc.steps[top.step].toUpperCase()} ${top.id}`,"tw");}
    return;}
  if(cmd==="triage"){
    const active=incidents.filter(i=>!i.resolved);if(!active.length){tPrint("All clear.","ts");return;}
    tPrint("─── TRIAGE ───","th");
    active.sort((a,b)=>tscore(b)-tscore(a)).slice(0,5).forEach((inc,i)=>{
      const sc=getScenario(inc),mod=window.CW_MODULES[inc.type];if(!sc||!mod)return;
      const t=tte(inc);
      const r=isSpread(inc)?"SPREADING NOW — 50pts penalty per event":inc.sev===3?"Sev 3 active — will spread":
        t!==null&&t<20?`Escalates Sev${inc.sev}→${inc.sev+1} in ${Math.round(t)}s`:inc.users>20000?`${inc.users.toLocaleString()} users affected`:
        `Next: ${sc.steps[inc.step].toUpperCase()} ${inc.id}`;
      tPrint(`  #${i+1} #${inc.id} ${mod.icon} ${sc.name} — ${r}`,i===0?"te":i<=2?"tw":"ti");
    });return;}
  if(cmd==="status"){tPrint(`─── Status · DEFCON ${defcon} ───`,"th");
    tPrint(`  Score ${score.toLocaleString()} | Resolved ${resolvedCount}/${spawnedCount} | Errors ${wrongCmds}`,"ti");
    tPrint(`  Spread events ${spreadEvts} | Time left ${fmt(Math.max(0,simDur-simT))}`,"ti");
    const w=worldClock();tPrint(`  Ops clock Day ${w.day} · ${String(w.hh).padStart(2,"0")}:${String(w.mm).padStart(2,"0")} UTC (×${ACCEL} RT)`,"td");return;}
  if(cmd==="history"){tPrint("─── History ───","th");cmdHistory.slice(0,10).forEach((h,i)=>tPrint(`  ${i+1}. ${h}`,"td"));return;}
  if(!idN||isNaN(idN)){
    if(ALL_CMDS.includes(cmd))tPrint(`Usage: ${cmd} <id>  |  'scan' to list incidents`,"td");
    else tPrint(`Unknown command '${cmd}'. Type 'help' or 'scan'.`,"td");return;}
  const inc=incidents.find(i=>i.id===idN);
  if(!inc){tPrint(`No incident #${idN}. Type 'scan' to see active threats.`,"td");return;}
  if(inc.resolved){tPrint(`#${idN} already resolved. Type 'scan' for active.`,"td");return;}
  const mod=window.CW_MODULES[inc.type],sc=getScenario(inc);if(!mod||!sc){tPrint("Module data missing.","te");return;}
  if(cmd==="inspect"){
    const bar="■".repeat(inc.step)+"□".repeat(sc.steps.length-inc.step),t=tte(inc);
    tPrint(`─── Incident #${inc.id}: ${sc.name} ───`,"th");
    tPrint(`  ${mod.icon} ${mod.cat} · Severity ${inc.sev} · [${bar}] step ${inc.step+1} of ${sc.steps.length}`,"ti");
    tPrint(`  ${inc.city} (${inc.region}) · ~${inc.users.toLocaleString()} users at risk`,"ti");
    if(inc.mutation)tPrint(`  Modifier: ${inc.mutationLabel}`,"tg");
    tPrint(`  ${inc.sev===3?"⚡ SEV 3 — SPREADING if unresolved":t!==null?`⏱ ~${Math.round(t)}s to Sev ${inc.sev+1}`:""}`,"tw");
    tPrint(`  Intel: ${sc.escs[inc.sev-1]}`,"td");
    tPrint(`  NEXT STEP: ${sc.steps[inc.step].toUpperCase()} ${inc.id}`,"ts");
    tPrintExec(sc.steps[inc.step],inc.id,"← click to execute");
    tPrint(`  'explain ${inc.id}' = OCR theory  |  'hint ${inc.id}' = -20pts guided hint`,"td");
    return;}
  if(cmd==="explain"){
    const note=["",`SCENARIO: ${sc.name}`,sc.short,"","RESPONSE STEPS:",
      ...sc.steps.map((s,i)=>`  ${i+1}. ${s.toUpperCase()} ${inc.id}`),""];
    typeLines([...mod.explain,...note],"ty");return;}
  if(cmd==="hint"){addScore(-20);tPrint(`HINT [-20 pts]: ${sc.steps[inc.step].toUpperCase()} ${inc.id}`,"tw");
    tPrint(`  ${sc.smsgs[inc.step]||""}`,"td");
    tPrintExec(sc.steps[inc.step],inc.id);return;}
  const expected=sc.steps[inc.step];
  if(cmd===expected){const msg=sc.smsgs[inc.step];inc.step++;
    if(inc.step>=sc.steps.length){tPrint(`✅ ${msg}`,"ts");resolveIncident(inc);}
    else{tPrint(`✓ ${msg}`,"ts");tPrint(`  NEXT: ${sc.steps[inc.step].toUpperCase()} ${inc.id}`,"ti");
      tPrintExec(sc.steps[inc.step],inc.id);renderIncidents();}return;}
  const fi=sc.steps.indexOf(cmd);
  if(fi>inc.step){tPrint(`⚠ Step ${fi+1} — do step ${inc.step+1} first: ${sc.steps[inc.step].toUpperCase()} ${inc.id}`,"tw");return;}
  if(fi>-1&&fi<inc.step){tPrint(`Already done. Next: ${sc.steps[inc.step].toUpperCase()} ${inc.id}`,"td");return;}
  if(sc.wrong&&sc.wrong[cmd]){wrongCmds++;addScore(-10);inc.escMulti*=1.15;
    tPrint(`❌ ${sc.wrong[cmd]}`,"te");tPrint(`   [-10 pts] Escalation accelerated. 'hint ${inc.id}' for help.`,"td");}
  else if(ALL_CMDS.includes(cmd)){wrongCmds++;addScore(-10);inc.escMulti*=1.08;
    tPrint(`❌ '${cmd}' not effective vs ${sc.name}. [-10 pts] 'inspect ${inc.id}'`,"te");}
  else tPrint(`Unknown: '${cmd}'. Type 'help'.`,"td");
}

function draw2d(dt){
  const w=c2d.width,h=c2d.height,cx=w/2,cy=h/2,R=Math.min(cx,cy)*.82;
  ctx2.clearRect(0,0,w,h);
  ctx2.fillStyle="#020804";ctx2.fillRect(0,0,w,h);
  ctx2.save();ctx2.globalAlpha=.06;ctx2.fillStyle="#00ff88";
  stars2.forEach(s=>ctx2.fillRect(s.x,s.y,1,1));ctx2.restore();
  ctx2.save();ctx2.beginPath();ctx2.arc(cx,cy,R,0,Math.PI*2);ctx2.clip();
  const la=.07+(5-defcon)*.018,ca=.16+(5-defcon)*.022;
  for(let lat=-88;lat<=88;lat+=2){const φ=lat*Math.PI/180;for(let lon=-178;lon<=178;lon+=2){
    const λ=(lon+rot2)*Math.PI/180;const z=Math.cos(φ)*Math.cos(λ);if(z<=0)continue;
    const x=Math.cos(φ)*Math.sin(λ),y=Math.sin(φ);const n=fbm(x+2.1,y-1.3,z+.7);
    if(n>.58){ctx2.globalAlpha=la;ctx2.fillStyle="#00ff88";ctx2.fillRect(cx+R*x,cy-R*y,2,2);}}}
  ctx2.restore();ctx2.globalAlpha=1;
  // outline
  const gc=["#003300","#001d3a","#2a2200","#2a1200","#2a0000"][5-defcon];
  ctx2.strokeStyle=gc;ctx2.lineWidth=.5;ctx2.save();ctx2.beginPath();ctx2.arc(cx,cy,R,0,Math.PI*2);ctx2.clip();
  for(let lat=-60;lat<=60;lat+=30){ctx2.beginPath();for(let lon=-180;lon<=180;lon+=5){const p=proj2(lat,lon);if(lon===-180)ctx2.moveTo(p.x,p.y);else ctx2.lineTo(p.x,p.y);}ctx2.stroke();}
  ctx2.restore();
  const oc=["#00ff66","#2266ff","#ccaa00","#cc5500","#cc0000"][5-defcon];
  ctx2.strokeStyle=oc;ctx2.lineWidth=1.5;ctx2.beginPath();ctx2.arc(cx,cy,R,0,Math.PI*2);ctx2.stroke();
  // cities
  CITY_NODES.forEach(c=>{const p=proj2(c.lat,c.lon);if(!p.visible)return;ctx2.save();ctx2.beginPath();ctx2.arc(p.x,p.y,2,0,Math.PI*2);ctx2.fillStyle="#00ff88";ctx2.globalAlpha=.2;ctx2.fill();ctx2.restore();});
  // incidents
  incidents.filter(i=>!i.resolved).forEach(inc=>{
    const p=proj2(inc.lat,inc.lon);if(!p.visible)return;
    const col=inc.sev===1?"#00ff88":inc.sev===2?"#ffaa00":"#ff3333";
    const base=inc.sev===1?6:inc.sev===2?9:13,pulse=base+Math.sin(performance.now()/200)*2.5;
    ctx2.save();ctx2.beginPath();ctx2.arc(p.x,p.y,pulse,0,Math.PI*2);ctx2.fillStyle=col;ctx2.globalAlpha=.1;ctx2.fill();
    ctx2.beginPath();ctx2.arc(p.x,p.y,base*.45,0,Math.PI*2);ctx2.fillStyle=col;ctx2.globalAlpha=.95;ctx2.shadowColor=col;ctx2.shadowBlur=12;ctx2.fill();
    const sc=getScenario(inc),mod=window.CW_MODULES[inc.type];
    ctx2.globalAlpha=.8;ctx2.font="11px 'Share Tech Mono',monospace";ctx2.fillStyle=col;ctx2.shadowBlur=0;
    ctx2.fillText(`${mod?mod.icon:""}#${inc.id} ${sc?sc.name:inc.type}`,p.x+12,p.y-4);ctx2.fillText(inc.city,p.x+12,p.y+8);
    ctx2.restore();});
}

// ═══ MAIN LOOP ═══
function animate(){
  const now=performance.now();const dt=Math.min(.05,(now-lastTick)/1e3);lastTick=now;
  if(is3D()){globeGroup.rotation.y=worldClock().frac*Math.PI*2;upCam();animMarkers(dt);animArcs(dt);starMesh.rotation.y+=dt*.005;renderer.render(scene,camera3);}
  else{rot2+=dt*7.2;draw2d(dt);}
  if(flashVal>0){const el=document.getElementById("edge-flash");el.style.boxShadow=`inset 0 0 180px rgba(255,59,107,${flashVal*.45})`;flashVal=Math.max(0,flashVal-dt*3);}else document.getElementById("edge-flash").style.boxShadow="";
  if(simRunning&&!simPaused){
    simT+=dt;idleT+=dt;
    document.getElementById("mission-t").textContent=fmt(Math.max(0,simDur-simT));
    updateClockUI();
    if(nextSpawnAt!==null&&simT>=nextSpawnAt){spawnIncident();schedNext();}
    if(simT>60&&idleT>5&&incidents.filter(i=>!i.resolved).length===0){spawnIncident();idleT=0;}
    if(Math.floor(simT)%8===0)checkMin();
    doEscalation(dt);doSpread(dt);
    if(simT>=simDur){simRunning=false;document.getElementById("btnPause").disabled=true;showEnd();}
  }
  requestAnimationFrame(animate);
}

// ═══ INIT ═══
resizeAll();
loadModules(()=>{
  const loaded=Object.keys(window.CW_MODULES);
  if(!loaded.length){document.getElementById("loading").innerHTML='<div class="load-t" style="color:var(--crit)">⚠ Modules not found — needs GitHub Pages or python3 serve.py</div>';return;}
  tPrint("═══ CYBERWATCH v3.0 ═══","th");
  tPrint(`${loaded.length} attack modules · ${loaded.reduce((s,n)=>s+(window.CW_MODULES[n]?.scenarios?.length||0),0)} scenarios ready.`,"ti");
  tPrint("Press DEPLOY to begin mission.","td");
  document.getElementById("btnStart").disabled=false;
  document.getElementById("loading").style.display="none";
  calcDefcon();animate();
});
